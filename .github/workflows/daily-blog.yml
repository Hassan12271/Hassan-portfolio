name: Daily Blog Publish

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production blog API
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BLOG_API_URL: ${{ vars.BLOG_API_URL }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not configured."
            exit 1
          fi

          API_URL="${BLOG_API_URL:-https://www.hassanraxa.com/api/cron/publish-blog}"
          curl --fail-with-body -X POST "$API_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
