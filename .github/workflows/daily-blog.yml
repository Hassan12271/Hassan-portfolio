name: Daily Blog Publish

on:
  schedule:
    # 09:00 AM PKT (UTC+5) = 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Publish daily blog post
        env:
          BLOG_AUTOMATION_MODE: ${{ vars.BLOG_AUTOMATION_MODE || 'template' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: node scripts/publish-daily-blog.mjs

      - name: Commit and push blog update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(blog): publish daily post'
          file_pattern: src/data/blog-posts.json
